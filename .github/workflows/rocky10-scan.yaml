name: Rocky10 Runtime Scan

permissions:
  contents: read

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read # for actions/checkout to fetch code
      security-events: write # for github/codeql-action/upload-sarif to upload SARIF results
      actions: read # only required for a private repository by github/codeql-action/upload-sarif to get the Action run status

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            qemu-system-x86 \
            qemu-utils \
            cloud-image-utils \
            curl \
            openssh-client \
            netcat-openbsd \
            ca-certificates

      - name: Download image
        run: |
          curl -L --retry 5 -o rocky10.img \
            https://dl.rockylinux.org/pub/rocky/10/images/x86_64/Rocky-10-GenericCloud-Base.latest.x86_64.qcow2

      - name: Generate SSH key
        run: |
          ssh-keygen -t rsa -b 4096 -f id_rsa -N ""

      - name: Create cloud-init config
        run: |
          cat > user-data <<EOF
          #cloud-config
          users:
            - name: clouduser
              sudo: ALL=(ALL) NOPASSWD:ALL
              groups: wheel
              shell: /bin/bash
              ssh_authorized_keys:
                - $(cat id_rsa.pub)
          ssh_pwauth: false
          disable_root: true
          EOF

          cloud-localds seed.iso user-data

      - name: Start Rocky10 VM
        run: |
          qemu-system-x86_64 \
            -m 2048 \
            -smp 2 \
            -machine type=q35,accel=tcg \
            -cpu max \
            -drive file=rocky10.img,format=qcow2,if=virtio \
            -drive file=seed.iso,format=raw,if=virtio \
            -boot c \
            -netdev user,id=net0,hostfwd=tcp::2222-:22 \
            -device virtio-net-pci,netdev=net0 \
            -nographic \
            -serial mon:stdio \
            > vm.log 2>&1 &

          echo $! > vm.pid

      - name: Wait for SSH to be fully ready
        run: |
          for i in {1..120}; do
            if ssh -i id_rsa \
              -o StrictHostKeyChecking=no \
              -o ConnectTimeout=2 \
              -o BatchMode=yes \
              -p 2222 clouduser@localhost "echo ready" >/dev/null 2>&1; then
              echo "✅ SSH is fully ready"
              exit 0
            fi
            echo "⏳ Waiting for SSH..."
            sleep 2
          done
          echo "❌ SSH failed to become ready"
          exit 1

      - name: Dump VM logs
        if: failure()
        run: cat vm.log || true

      - name: Run Trivy scan inside VM
        run: |
          ssh -i id_rsa -p 2222 clouduser@localhost <<'EOF'
          set -e
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh
          sudo ./bin/trivy rootfs / \
            --scanners vuln,misconfig \
            -f sarif \
            -o /tmp/report.sarif
          EOF

      - name: Copy report from VM
        run: |
          scp -i id_rsa -P 2222 \
            -o StrictHostKeyChecking=no \
            clouduser@localhost:/tmp/report.sarif \
            report.sarif

      - name: Stop VM
        if: always()
        run: |
          kill $(cat vm.pid) || true

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@68bde559dea0fdcac2102bfdf6230c5f70eb485e # v4.35.4
        with:
          sarif_file: report.sarif
